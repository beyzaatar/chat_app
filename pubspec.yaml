name: chat_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.3
  animations: ^2.1.1
  supabase_flutter: ^2.12.0
  firebase_messaging: ^16.1.1
  firebase_core: ^4.4.0
  flutter_local_notifications: ^20.1.0
  livekit_client: ^2.6.5
  permission_handler: ^12.0.1
  uuid: ^4.5.3
  record: ^6.2.0
  just_audio: ^0.10.5
  audio_waveforms: ^2.0.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lang/common/
    - assets/lang/home/
    - assets/lang/login/
    - assets/lang/notification/
    - assets/lang/profile/
    - assets/lang/settings/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/daphne_app_icon.png"

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
name: chat_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.0
  go_router: ^17.0.1
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.3
  animations: ^2.1.1
  supabase_flutter: ^2.12.0
  firebase_messaging: ^16.1.1
  firebase_core: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/daphne_app_icon.png"

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

    - family: DM Mono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf